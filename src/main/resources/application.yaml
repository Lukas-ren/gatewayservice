server:
  port: 8080

spring:
  application:
    name: gateway-service

    springdoc:
      api-docs:
        path: /api-docs
      swagger-ui:
        path: /swagger-ui.html
        tags-sorter: alpha
        operations-sorter: alpha

  cloud:
    gateway:
      # ── CORS global ────────────────────────────────────────────────────────────
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "*"
            allowed-methods: GET, POST, PUT, PATCH, DELETE, OPTIONS
            allowed-headers: "*"
            exposed-headers: Authorization

      # ── Rutas ──────────────────────────────────────────────────────────────────
      routes:

        # Auth — público, sin filtro JWT
        - id: auth-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0

        # User — protegido
        - id: user-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=0
            - JwtAuthentication

        # Product — GET público, escritura protegida
        - id: product-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/products/**, /api/v1/categories/**
          filters:
            - StripPrefix=0

        # Inventory — protegido
        - id: inventory-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/inventory/**
          filters:
            - StripPrefix=0
            - JwtAuthentication

        # Order — protegido
        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - StripPrefix=0
            - JwtAuthentication

        # Payment — protegido
        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - StripPrefix=0
            - JwtAuthentication

        # Shipping — protegido
        - id: shipping-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/shippings/**
          filters:
            - StripPrefix=0
            - JwtAuthentication

        # Notification — protegido
        - id: notification-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=0
            - JwtAuthentication

jwt:
  secret: fitting-secret-key-2026-microservices-tienda-ropa-muy-larga

logging:
  level:
    com.fitting.gatewayservice: DEBUG
    org.springframework.cloud.gateway: DEBUG