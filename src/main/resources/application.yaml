server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origins: "*"
                allowed-methods: GET, POST, PUT, PATCH, DELETE, OPTIONS
                allowed-headers: "*"
                exposed-headers: Authorization
          routes:
            - id: auth-service
              uri: lb://auth-service        # lb:// = load balanced via Eureka
              predicates:
                - Path=/api/v1/auth/**
              filters:
                - StripPrefix=0

            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/users/**
              filters:
                - StripPrefix=0
                - JwtAuthentication

            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/api/v1/products/**, /api/v1/categories/**
              filters:
                - StripPrefix=0

            - id: inventory-service
              uri: lb://inventory-service
              predicates:
                - Path=/api/v1/inventory/**
              filters:
                - StripPrefix=0
                - JwtAuthentication

            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/v1/orders/**
              filters:
                - StripPrefix=0
                - JwtAuthentication

            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/v1/payments/**
              filters:
                - StripPrefix=0
                - JwtAuthentication

            - id: shipping-service
              uri: lb://shipping-service
              predicates:
                - Path=/api/v1/shippings/**
              filters:
                - StripPrefix=0
                - JwtAuthentication

            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/v1/notifications/**
              filters:
                - StripPrefix=0
                - JwtAuthentication

            - id: cart-service
              uri: lb://cart-service
              predicates:
                - Path=/api/v1/cart/**
              filters:
                - StripPrefix=0
                - JwtAuthentication

jwt:
  secret: fitting-secret-key-2026-microservices-tienda-ropa-muy-larga

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    com.fitting.gatewayservice: DEBUG
    org.springframework.cloud.gateway: DEBUG